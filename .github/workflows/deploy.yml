name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 62.238.9.129
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          source: "bot_v3.py,analytics.py,dashboard.py,backtest.py,config.json"
          target: /root/
          strip_components: 0
